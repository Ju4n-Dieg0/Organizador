services:
  db:
    image: postgres:16-alpine
    container_name: organizador-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: organizador
      POSTGRES_PASSWORD: organizador
      POSTGRES_DB: organizador
    ports:
      - "5432:5432"
    volumes:
      - organizador_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organizador"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  organizador_pgdata:
